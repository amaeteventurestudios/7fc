# Cloudflare configuration for 7FC (deployed via @opennextjs/cloudflare)
name = "7fc"
main = "worker/index.js"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Automatic outbox delivery + retention cleanup: every 5 minutes.
# The scheduled handler (worker/index.js) self-invokes /api/cron/outbox.
[triggers]
crons = ["*/5 * * * *"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Production D1 database — the app detects this binding at runtime and uses
# the D1 store (lib/d1-store.ts). Without it, the local JSON fallback is used.
[[d1_databases]]
binding = "DB"
database_name = "7fc-prod"
database_id = "747fcf59-7492-4b73-97ca-edad62806f27"
migrations_dir = "migrations"

# R2 bucket for admin-uploaded product images (persistent object storage).
# Served publicly through /api/images/[...key]. Without this binding the
# admin upload endpoint returns a clear "storage not configured" error
# (local `next dev` falls back to writing into public/images/uploads/).
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "7fc-images"

# Public (non-secret) runtime variables. Committing these is intentional and
# keeps them applied on every `wrangler deploy` (a deploy replaces the
# Worker's plain-text vars with this block — encrypted secrets are untouched).
#
# TURNSTILE_SITE_KEY is the PUBLIC Cloudflare Turnstile site key. It is
# delivered to browsers by design (via /api/turnstile/config), so storing it
# in source control is safe and ensures deploys never drop it.
[vars]
TURNSTILE_SITE_KEY = "0x4AAAAAAD0blRzg07BjMJeC"

# Encrypted Worker secrets (NEVER committed; managed with `wrangler secret put`).
# These persist across deploys independently of the [vars] block above:
#   SESSION_SECRET          npx wrangler secret put SESSION_SECRET
#   TURNSTILE_SECRET_KEY    npx wrangler secret put TURNSTILE_SECRET_KEY
#   RESEND_API_KEY          npx wrangler secret put RESEND_API_KEY
#   RESEND_WEBHOOK_SECRET   npx wrangler secret put RESEND_WEBHOOK_SECRET
# Optional bootstrap overrides (dev only; no production default exists):
#   ADMIN_TEMP_EMAIL / ADMIN_TEMP_PASSWORD
# Optional plain var: ADMIN_SETUP_MODE=false force-disables the temporary login button.
